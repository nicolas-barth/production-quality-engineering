<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <title>iPhone — Your Store</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }
      header {
        background: #333;
        color: #fff;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      #cart button {
        background: #555;
        color: #fff;
        border: none;
        padding: 6px 12px;
        cursor: pointer;
      }
      main {
        padding: 20px;
      }
      .alert {
        padding: 10px 15px;
        border-radius: 3px;
        margin-bottom: 15px;
        display: none;
      }
      .alert-success {
        background: #d4edda;
        border: 1px solid #c3e6cb;
        color: #155724;
      }
      .alert-danger {
        background: #f8d7da;
        border: 1px solid #f5c6cb;
        color: #721c24;
      }
      #button-cart {
        background: #28a745;
        color: #fff;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        font-size: 16px;
      }
      #input-quantity {
        width: 60px;
        padding: 5px;
        text-align: center;
        border: 1px solid #ccc;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/en-gb" style="color: #fff; font-weight: bold; text-decoration: none">Your Store</a>
      <div id="cart">
        <button type="button">
          <span id="cart-total" aria-label="0 item(s)">0 item(s)</span>
        </button>
      </div>
    </header>

    <main id="content">
      <div role="alert" class="alert alert-success"></div>
      <div role="alert" class="alert alert-danger"></div>

      <h1>iPhone</h1>
      <div style="margin: 15px 0; display: flex; align-items: center; gap: 10px">
        <label for="input-quantity">Qty</label>
        <input id="input-quantity" type="number" value="1" min="1" max="999" />
        <button id="button-cart" type="button">Add to Cart</button>
      </div>
    </main>

    <script>
      var CART_KEY = 'mockCart';
      var PRODUCT_ID = 40;
      var PRODUCT_NAME = 'iPhone';
      var PRODUCT_PRICE = 101.0;

      function getCart() {
        try {
          return JSON.parse(localStorage.getItem(CART_KEY) || '[]');
        } catch (e) {
          return [];
        }
      }

      function updateBadge(cart) {
        var count = cart.reduce(function (s, i) {
          return s + i.qty;
        }, 0);
        var text = count + ' item(s)';
        var el = document.getElementById('cart-total');
        el.textContent = text;
        el.setAttribute('aria-label', text);
      }

      updateBadge(getCart());

      document.getElementById('button-cart').addEventListener('click', function () {
        var qty = parseInt(document.getElementById('input-quantity').value) || 1;

        // POST to the cart-add endpoint — Cypress intercepts this via cy.intercept().
        // The response drives the DOM update (alert + badge), so cy.wait('@cartAdd')
        // resolves only after the fixture JSON is received and the DOM is updated.
        fetch('/en-gb/index.php?route=checkout/cart/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'product_id=' + PRODUCT_ID + '&quantity=' + qty,
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            if (data.success) {
              var cart = getCart();
              var existing = cart.find(function (i) {
                return i.id === PRODUCT_ID;
              });
              if (existing) {
                existing.qty += qty;
              } else {
                cart.push({ id: PRODUCT_ID, name: PRODUCT_NAME, price: PRODUCT_PRICE, qty: qty });
              }
              localStorage.setItem(CART_KEY, JSON.stringify(cart));
              updateBadge(cart);

              var alertEl = document.querySelector('.alert-success');
              alertEl.textContent = data.success;
              alertEl.style.display = 'block';
            }
          })
          .catch(function () {
            document.querySelector('.alert-danger').style.display = 'block';
            document.querySelector('.alert-danger').textContent = 'Could not add item to cart.';
          });
      });
    </script>
  </body>
</html>
