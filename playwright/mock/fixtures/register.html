<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register — Your Store</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }
      header {
        background: #333;
        color: #fff;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      #cart button {
        background: #555;
        color: #fff;
        border: none;
        padding: 6px 12px;
        cursor: pointer;
      }
      .account-links a {
        color: #ccc;
        text-decoration: none;
        margin-left: 10px;
      }
      main {
        padding: 20px;
        max-width: 600px;
      }
      .alert {
        padding: 10px 15px;
        border-radius: 3px;
        margin-bottom: 15px;
        display: none;
      }
      .alert-danger {
        background: #f8d7da;
        border: 1px solid #f5c6cb;
        color: #721c24;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-weight: bold;
      }
      input[type='text'],
      input[type='email'],
      input[type='tel'],
      input[type='password'] {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 3px;
        box-sizing: border-box;
      }
      .text-danger {
        color: #dc3545;
        font-size: 13px;
        display: none;
        margin-top: 4px;
      }
      input[type='submit'] {
        background: #007bff;
        color: #fff;
        border: none;
        padding: 8px 20px;
        cursor: pointer;
        border-radius: 3px;
      }
      fieldset {
        border: 1px solid #dee2e6;
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 3px;
      }
      legend {
        font-weight: bold;
        padding: 0 8px;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/en-gb" style="color: #fff; font-weight: bold; text-decoration: none">Your Store</a>
      <div class="header-right">
        <div id="cart">
          <button type="button" aria-label="Shopping cart">
            <span id="cart-total">0 item(s)</span>
          </button>
        </div>
        <div class="account-links">
          <a class="nav-link" title="My Account" href="#">My Account</a>
          <a href="/en-gb?route=account/login">Login</a>
        </div>
      </div>
    </header>

    <main id="content">
      <h1>Register Account</h1>
      <p>
        If you already have an account with us, please
        <a href="/en-gb?route=account/login">login</a>.
      </p>

      <div role="alert" class="alert alert-danger" id="alert-warning"></div>

      <form id="form-register" action="/en-gb?route=account/register" method="post">
        <fieldset>
          <legend>Your Personal Details</legend>
          <div class="form-group">
            <label for="input-firstname"
              >First Name <span style="color: red" aria-hidden="true">*</span></label
            >
            <input
              id="input-firstname"
              type="text"
              name="firstname"
              placeholder="First Name"
              autocomplete="given-name"
            />
            <div id="error-firstname" class="text-danger" role="alert"></div>
          </div>
          <div class="form-group">
            <label for="input-lastname"
              >Last Name <span style="color: red" aria-hidden="true">*</span></label
            >
            <input
              id="input-lastname"
              type="text"
              name="lastname"
              placeholder="Last Name"
              autocomplete="family-name"
            />
            <div id="error-lastname" class="text-danger" role="alert"></div>
          </div>
          <div class="form-group">
            <label for="input-email"
              >E-Mail <span style="color: red" aria-hidden="true">*</span></label
            >
            <input
              id="input-email"
              type="email"
              name="email"
              placeholder="E-Mail"
              autocomplete="email"
            />
            <div id="error-email" class="text-danger" role="alert"></div>
          </div>
          <div class="form-group">
            <label for="input-telephone"
              >Telephone <span style="color: red" aria-hidden="true">*</span></label
            >
            <input
              id="input-telephone"
              type="tel"
              name="telephone"
              placeholder="Telephone"
              autocomplete="tel"
            />
            <div id="error-telephone" class="text-danger" role="alert"></div>
          </div>
        </fieldset>

        <fieldset>
          <legend>Your Password</legend>
          <div class="form-group">
            <label for="input-password"
              >Password <span style="color: red" aria-hidden="true">*</span></label
            >
            <input
              id="input-password"
              type="password"
              name="password"
              placeholder="Password"
              autocomplete="new-password"
            />
            <div id="error-password" class="text-danger" role="alert"></div>
          </div>
          <div class="form-group">
            <label for="input-confirm"
              >Confirm Password <span style="color: red" aria-hidden="true">*</span></label
            >
            <input
              id="input-confirm"
              type="password"
              name="confirm"
              placeholder="Confirm Password"
              autocomplete="new-password"
            />
            <div id="error-confirm" class="text-danger" role="alert"></div>
          </div>
        </fieldset>

        <fieldset>
          <legend>Newsletter</legend>
          <div>
            <label
              ><input type="radio" id="input-newsletter-yes" name="newsletter" value="1" />
              Yes</label
            >
            <label style="margin-left: 15px"
              ><input type="radio" id="input-newsletter-no" name="newsletter" value="0" checked />
              No</label
            >
          </div>
        </fieldset>

        <div class="form-group">
          <label>
            <input type="checkbox" name="agree" id="input-agree" value="1" />
            I have read and agree to the <a href="#">Privacy Policy</a>
          </label>
        </div>

        <div>
          <input type="submit" value="Continue" />
        </div>
      </form>
    </main>

    <script>
      var CART_KEY = 'mockCart';
      function getCartCount() {
        try {
          return JSON.parse(localStorage.getItem(CART_KEY) || '[]').reduce(function (s, i) {
            return s + i.qty;
          }, 0);
        } catch (e) {
          return 0;
        }
      }
      document.getElementById('cart-total').textContent = getCartCount() + ' item(s)';

      document.getElementById('form-register').addEventListener('submit', function (e) {
        e.preventDefault();

        var fields = [
          ['input-firstname', 'error-firstname', 'First Name must be between 1 and 32 characters!'],
          ['input-lastname', 'error-lastname', 'Last Name must be between 1 and 32 characters!'],
          ['input-email', 'error-email', 'E-Mail Address does not appear to be valid!'],
          ['input-telephone', 'error-telephone', 'Telephone must be between 3 and 32 characters!'],
        ];

        var password = document.getElementById('input-password').value;
        var confirm = document.getElementById('input-confirm').value;
        var passwordError = document.getElementById('error-password');
        var confirmError = document.getElementById('error-confirm');

        var valid = true;

        fields.forEach(function (f) {
          var input = document.getElementById(f[0]);
          var err = document.getElementById(f[1]);
          if (!input.value.trim()) {
            err.textContent = f[2];
            err.style.display = 'block';
            valid = false;
          } else {
            err.style.display = 'none';
          }
        });

        if (password.length < 4 || password.length > 20) {
          passwordError.textContent = 'Password must be between 4 and 20 characters!';
          passwordError.style.display = 'block';
          valid = false;
        } else {
          passwordError.style.display = 'none';
        }

        if (password && confirm && password !== confirm) {
          confirmError.textContent = 'Password confirmation does not match password!';
          confirmError.style.display = 'block';
          valid = false;
        } else {
          confirmError.style.display = 'none';
        }

        if (!valid) return;

        window.location.href = '/en-gb?route=account/success';
      });
    </script>
  </body>
</html>
