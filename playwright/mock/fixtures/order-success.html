<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Order Placed — Your Store</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }
      header {
        background: #333;
        color: #fff;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      #cart button {
        background: #555;
        color: #fff;
        border: none;
        padding: 6px 12px;
        cursor: pointer;
      }
      main {
        padding: 40px 20px;
        text-align: center;
      }
      h1 {
        color: #28a745;
      }
      a {
        color: #007bff;
      }
      .btn {
        display: inline-block;
        background: #007bff;
        color: #fff;
        padding: 10px 20px;
        text-decoration: none;
        border-radius: 3px;
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/en-gb" style="color: #fff; font-weight: bold; text-decoration: none">Your Store</a>
      <div class="header-right">
        <div id="cart">
          <button type="button" aria-label="Shopping cart">
            <span id="cart-total">0 item(s)</span>
          </button>
        </div>
      </div>
    </header>

    <main id="content">
      <h1>Your order has been placed!</h1>
      <p>Thank you for your purchase. Your order number is:</p>
      <p>
        <a href="/en-gb?route=account/order/info&order_id=1001">#1001</a>
      </p>
      <p>You will receive a confirmation email shortly.</p>
      <a class="btn" href="/en-gb?route=common/home">Continue Shopping</a>
    </main>

    <script>
      var CART_KEY = 'mockCart';
      function getCartCount() {
        try {
          return JSON.parse(localStorage.getItem(CART_KEY) || '[]').reduce(function (s, i) {
            return s + i.qty;
          }, 0);
        } catch (e) {
          return 0;
        }
      }
      document.getElementById('cart-total').textContent = getCartCount() + ' item(s)';
    </script>
  </body>
</html>
