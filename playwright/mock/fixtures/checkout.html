<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkout — Your Store</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }
      header {
        background: #333;
        color: #fff;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      #cart button {
        background: #555;
        color: #fff;
        border: none;
        padding: 6px 12px;
        cursor: pointer;
      }
      main {
        padding: 20px;
        max-width: 700px;
      }
      .checkout-step {
        border: 1px solid #dee2e6;
        border-radius: 4px;
        margin-bottom: 20px;
        padding: 20px;
      }
      .checkout-step h2 {
        margin-top: 0;
        font-size: 18px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-weight: bold;
      }
      input[type='text'],
      input[type='email'],
      select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 3px;
        box-sizing: border-box;
      }
      input[type='radio'] {
        margin-right: 6px;
      }
      .text-danger {
        color: #dc3545;
        font-size: 13px;
        display: none;
        margin-top: 4px;
      }
      button[id^='button-'] {
        background: #007bff;
        color: #fff;
        border: none;
        padding: 8px 20px;
        cursor: pointer;
        border-radius: 3px;
        margin-top: 10px;
      }
      button[id^='button-']:hover {
        background: #0056b3;
      }
      #button-confirm {
        background: #28a745;
      }
      #button-confirm:hover {
        background: #1e7e34;
      }
      .alert {
        padding: 10px 15px;
        border-radius: 3px;
        margin-bottom: 15px;
        display: none;
      }
      .alert-danger {
        background: #f8d7da;
        border: 1px solid #f5c6cb;
        color: #721c24;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/en-gb" style="color: #fff; font-weight: bold; text-decoration: none">Your Store</a>
      <div class="header-right">
        <div id="cart">
          <button type="button" aria-label="Shopping cart">
            <span id="cart-total">0 item(s)</span>
          </button>
        </div>
      </div>
    </header>

    <main id="content">
      <h1>Checkout</h1>

      <!-- Step 1: Account / Guest -->
      <div class="checkout-step" id="step-1">
        <h2>Step 1: Account &amp; Personal Details</h2>
        <fieldset>
          <legend>Choose checkout type</legend>
          <div>
            <label
              ><input type="radio" id="input-guest" name="account" value="guest" checked /> Guest
              Checkout</label
            >
          </div>
          <div>
            <label
              ><input type="radio" id="input-login" name="account" value="login" /> Returning
              Customer</label
            >
          </div>
        </fieldset>
        <div class="form-group" style="margin-top: 12px">
          <label for="input-email">Email Address</label>
          <input id="input-email" type="email" placeholder="Enter your email address" />
        </div>
        <button id="button-account" type="button">Continue</button>
      </div>

      <!-- Step 2: Billing Address -->
      <div class="checkout-step" id="step-2" style="display: none">
        <h2>Step 2: Billing Details</h2>
        <div id="payment-address">
          <div class="form-group">
            <label for="input-payment-firstname">First Name</label>
            <input id="input-payment-firstname" type="text" placeholder="First Name" />
            <div id="error-payment-firstname" class="text-danger" role="alert"></div>
          </div>
          <div class="form-group">
            <label for="input-payment-lastname">Last Name</label>
            <input id="input-payment-lastname" type="text" placeholder="Last Name" />
            <div id="error-payment-lastname" class="text-danger" role="alert"></div>
          </div>
          <div class="form-group">
            <label for="input-payment-company">Company (optional)</label>
            <input id="input-payment-company" type="text" placeholder="Company" />
          </div>
          <div class="form-group">
            <label for="input-payment-address-1">Address Line 1</label>
            <input id="input-payment-address-1" type="text" placeholder="Address Line 1" />
            <div id="error-payment-address-1" class="text-danger" role="alert"></div>
          </div>
          <div class="form-group">
            <label for="input-payment-address-2">Address Line 2 (optional)</label>
            <input id="input-payment-address-2" type="text" placeholder="Address Line 2" />
          </div>
          <div class="form-group">
            <label for="input-payment-city">City</label>
            <input id="input-payment-city" type="text" placeholder="City" />
            <div id="error-payment-city" class="text-danger" role="alert"></div>
          </div>
          <div class="form-group">
            <label for="input-payment-postcode">Post Code</label>
            <input id="input-payment-postcode" type="text" placeholder="Post Code" />
            <div id="error-payment-postcode" class="text-danger" role="alert"></div>
          </div>
          <div class="form-group">
            <label for="input-payment-country">Country</label>
            <select id="input-payment-country" name="country_id">
              <option value="">--- Please Select ---</option>
              <option value="14">Australia</option>
              <option value="102">Germany</option>
              <option value="222">United Kingdom</option>
              <option value="223">United States</option>
            </select>
          </div>
          <div class="form-group">
            <label for="input-payment-zone">Region / State</label>
            <select id="input-payment-zone" name="zone_id">
              <option value="">--- Please Select ---</option>
            </select>
            <div id="error-payment-zone" class="text-danger" role="alert"></div>
          </div>
        </div>
        <button id="button-payment-address" type="button">Continue</button>
      </div>

      <!-- Step 3: Delivery Address -->
      <div class="checkout-step" id="step-3" style="display: none">
        <h2>Step 3: Delivery Details</h2>
        <div>
          <label>
            <input type="checkbox" id="input-shipping-address-0" name="same_address" checked />
            My delivery and billing addresses are the same.
          </label>
        </div>
        <button id="button-shipping-address" type="button">Continue</button>
      </div>

      <!-- Step 4: Delivery Method -->
      <div class="checkout-step" id="step-4" style="display: none">
        <h2>Step 4: Delivery Method</h2>
        <fieldset>
          <legend>Choose delivery method</legend>
          <label>
            <input type="radio" name="shipping_method" value="flat.flat" checked />
            Flat Shipping Rate — £5.00
          </label>
        </fieldset>
        <button id="button-shipping-method" type="button">Continue</button>
      </div>

      <!-- Step 5: Payment Method -->
      <div class="checkout-step" id="step-5" style="display: none">
        <h2>Step 5: Payment Method</h2>
        <fieldset>
          <legend>Choose payment method</legend>
          <label>
            <input type="radio" name="payment_method" value="cod" checked />
            Cash On Delivery
          </label>
        </fieldset>
        <button id="button-payment-method" type="button">Continue</button>
      </div>

      <!-- Step 6: Confirm Order -->
      <div class="checkout-step" id="step-6" style="display: none">
        <h2>Step 6: Confirm Order</h2>
        <p>Please review your order before confirming.</p>
        <div role="alert" class="alert alert-danger" id="error-agree-alert"></div>
        <div>
          <label>
            <input type="checkbox" name="agree" id="input-agree" />
            I have read and agree to the <a href="#">Privacy Policy</a>
          </label>
        </div>
        <button id="button-confirm" type="button">Confirm Order</button>
      </div>
    </main>

    <script>
      var CART_KEY = 'mockCart';
      function getCartCount() {
        try {
          return JSON.parse(localStorage.getItem(CART_KEY) || '[]').reduce(function (s, i) {
            return s + i.qty;
          }, 0);
        } catch (e) {
          return 0;
        }
      }
      document.getElementById('cart-total').textContent = getCartCount() + ' item(s)';

      function showStep(n) {
        [1, 2, 3, 4, 5, 6].forEach(function (s) {
          var el = document.getElementById('step-' + s);
          if (el) el.style.display = s === n ? 'block' : 'none';
        });
      }

      // Step 1 → Step 2
      document.getElementById('button-account').addEventListener('click', function () {
        var email = document.getElementById('input-email').value.trim();
        if (!email) {
          document.getElementById('input-email').style.border = '1px solid #dc3545';
          return;
        }
        showStep(2);
      });

      // Step 2 → Step 3 (with validation)
      document.getElementById('button-payment-address').addEventListener('click', function () {
        var required = [
          [
            'input-payment-firstname',
            'error-payment-firstname',
            'First Name must be between 1 and 32 characters!',
          ],
          [
            'input-payment-lastname',
            'error-payment-lastname',
            'Last Name must be between 1 and 32 characters!',
          ],
          [
            'input-payment-address-1',
            'error-payment-address-1',
            'Address 1 must be between 3 and 128 characters!',
          ],
          [
            'input-payment-city',
            'error-payment-city',
            'City must be between 2 and 128 characters!',
          ],
          [
            'input-payment-postcode',
            'error-payment-postcode',
            'Postcode must be between 2 and 10 characters!',
          ],
        ];
        var valid = true;
        required.forEach(function (r) {
          var input = document.getElementById(r[0]);
          var errEl = document.getElementById(r[1]);
          if (!input || !input.value.trim()) {
            if (errEl) {
              errEl.textContent = r[2];
              errEl.style.display = 'block';
            }
            valid = false;
          } else {
            if (errEl) errEl.style.display = 'none';
          }
        });
        if (valid) showStep(3);
      });

      // Step 3 → Step 4
      document.getElementById('button-shipping-address').addEventListener('click', function () {
        showStep(4);
      });

      // Step 4 → Step 5
      document.getElementById('button-shipping-method').addEventListener('click', function () {
        showStep(5);
      });

      // Step 5 → Step 6
      document.getElementById('button-payment-method').addEventListener('click', function () {
        showStep(6);
      });

      // Step 6: Confirm Order
      document.getElementById('button-confirm').addEventListener('click', function () {
        var agreed = document.getElementById('input-agree').checked;
        if (!agreed) {
          var errAlert = document.getElementById('error-agree-alert');
          errAlert.textContent = 'Warning: You must agree to the Privacy Policy!';
          errAlert.style.display = 'block';
          // Also add a generic visible error for the test assertion
          var body = document.createElement('div');
          body.className = 'alert-danger';
          body.style.display = 'block';
          body.textContent = 'Warning: You must agree to the Privacy Policy!';
          return;
        }
        // Clear cart and navigate to success
        localStorage.removeItem(CART_KEY);
        document.getElementById('cart-total').textContent = '0 item(s)';
        window.location.href = '/en-gb?route=checkout/success';
      });

      // Country/region cascade for billing address
      document.getElementById('input-payment-country').addEventListener('change', function () {
        var countryId = this.value;
        var regionSelect = document.getElementById('input-payment-zone');

        // Trigger the AJAX fetch that CheckoutPage.fillBillingAddress() waits for
        fetch('/en-gb?route=localisation/country/info&country_id=' + countryId)
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            regionSelect.innerHTML = '<option value="">--- Please Select ---</option>';
            if (data && data.zone) {
              data.zone.forEach(function (z) {
                var opt = document.createElement('option');
                opt.value = z.zone_id;
                opt.textContent = z.name;
                regionSelect.appendChild(opt);
              });
            }
          })
          .catch(function () {
            // Fallback: populate with common UK regions
            var fallbackRegions = [
              ['2644', 'Greater London'],
              ['2645', 'England'],
              ['2646', 'Scotland'],
              ['2647', 'Wales'],
              ['2648', 'Northern Ireland'],
            ];
            regionSelect.innerHTML = '<option value="">--- Please Select ---</option>';
            fallbackRegions.forEach(function (r) {
              var opt = document.createElement('option');
              opt.value = r[0];
              opt.textContent = r[1];
              regionSelect.appendChild(opt);
            });
          });
      });
    </script>
  </body>
</html>
