<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Search — No Results — Your Store</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }
      header {
        background: #333;
        color: #fff;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      #cart button {
        background: #555;
        color: #fff;
        border: none;
        padding: 6px 12px;
        cursor: pointer;
      }
      .account-links a {
        color: #ccc;
        text-decoration: none;
        margin-left: 10px;
      }
      main {
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/en-gb" style="color: #fff; font-weight: bold; text-decoration: none">Your Store</a>
      <div class="header-right">
        <form action="/en-gb?route=common/search" method="get" role="search">
          <label for="search-input" style="position: absolute; left: -9999px">Search</label>
          <input
            id="search-input"
            name="search"
            type="search"
            placeholder="Search"
            aria-label="Search store products"
          />
          <button type="submit" aria-label="Submit search">Go</button>
        </form>
        <div id="cart">
          <button type="button" aria-label="Shopping cart">
            <span id="cart-total">0 item(s)</span>
          </button>
        </div>
        <div class="account-links">
          <a class="nav-link" title="My Account" href="#">My Account</a>
          <a href="/en-gb?route=account/login">Login</a>
        </div>
      </div>
    </header>

    <main id="content">
      <h1>Search</h1>
      <p>There is no product that matches the search criteria.</p>
    </main>

    <script>
      var CART_KEY = 'mockCart';
      function getCart() {
        try {
          return JSON.parse(localStorage.getItem(CART_KEY) || '[]');
        } catch (e) {
          return [];
        }
      }
      document.getElementById('cart-total').textContent =
        getCart().reduce(function (s, i) {
          return s + i.qty;
        }, 0) + ' item(s)';
    </script>
  </body>
</html>
