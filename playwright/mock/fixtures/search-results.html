<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Search — iPhone — Your Store</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }
      header {
        background: #333;
        color: #fff;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      #cart button {
        background: #555;
        color: #fff;
        border: none;
        padding: 6px 12px;
        cursor: pointer;
      }
      .account-links a {
        color: #ccc;
        text-decoration: none;
        margin-left: 10px;
      }
      main {
        padding: 20px;
      }
      .product-thumb {
        border: 1px solid #ddd;
        padding: 15px;
        margin: 10px;
        display: inline-block;
        vertical-align: top;
        width: 180px;
      }
      .product-thumb img {
        max-width: 100%;
      }
      .product-thumb .caption h4 a {
        text-decoration: none;
        color: #333;
        font-size: 14px;
      }
      .product-grid {
        display: flex;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/en-gb" style="color: #fff; font-weight: bold; text-decoration: none">Your Store</a>
      <div class="header-right">
        <form action="/en-gb?route=common/search" method="get" role="search">
          <label for="search-input" style="position: absolute; left: -9999px">Search</label>
          <input
            id="search-input"
            name="search"
            type="search"
            placeholder="Search"
            aria-label="Search store products"
            value="iPhone"
          />
          <button type="submit" aria-label="Submit search">Go</button>
        </form>
        <div id="cart">
          <button type="button" aria-label="Shopping cart">
            <span id="cart-total">0 item(s)</span>
          </button>
        </div>
        <div class="account-links">
          <a class="nav-link" title="My Account" href="#">My Account</a>
          <a href="/en-gb?route=account/login">Login</a>
        </div>
      </div>
    </header>

    <main id="content">
      <h1>Search</h1>
      <p>Search term: <strong>iPhone</strong></p>

      <div id="product-list" class="product-grid" aria-label="Search results">
        <div class="product-thumb">
          <a href="/en-gb?route=product/product&product_id=40">
            <img src="" alt="iPhone" width="160" height="120" />
          </a>
          <div class="caption">
            <h4><a href="/en-gb?route=product/product&product_id=40">iPhone</a></h4>
            <p class="price">$101.00</p>
          </div>
        </div>
      </div>
    </main>

    <script>
      var CART_KEY = 'mockCart';
      function getCart() {
        try {
          return JSON.parse(localStorage.getItem(CART_KEY) || '[]');
        } catch (e) {
          return [];
        }
      }
      function updateBadge() {
        var count = getCart().reduce(function (s, i) {
          return s + i.qty;
        }, 0);
        document.getElementById('cart-total').textContent = count + ' item(s)';
      }
      updateBadge();
    </script>
  </body>
</html>
