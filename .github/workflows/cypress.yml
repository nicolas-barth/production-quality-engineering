name: Cypress Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CI: true

jobs:
  cypress:
    name: Cypress — Network Interception Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # screenshotOnRunFailure and video are set in cypress.config.ts, not here —
      # Cypress 13 does not accept screenshotOnRunFailure as a CLI --config flag.
      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
        env:
          CYPRESS_MOCK: 'true'

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 14

      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: cypress/videos/
          retention-days: 14
